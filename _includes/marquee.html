<style>
  :root {
    --marquee-width: 100vw;
    --marquee-height: 20vh;
    --marquee-elements-displayed: 5;
    --marquee-element-width: calc(var(--marquee-width) / var(--marquee-elements-displayed));
    --marquee-elements: 10;
    --marquee-animation-duration: calc(var(--marquee-elements) * 1.5s);

  }

  html[data-mode="dark"] {
    --marquee-element-color: red;
  }

  html:not([data-mode="dark"]),
  html[data-mode="light"] {
    --marquee-element-color: rgb(52, 52, 60);
  }

  .marquee-body {
    font-family: 'Montserrat', sans-serif;
    background-color: #eee;
    color: #111;
    height: 20vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;

  }


  .marquee {
    overflow: hidden;
    width: var(--marquee-width);
    height: var(--marquee-height);
    background-color: var(--main-bg);
    color: #eee;
    position: relative;
    /* padding-bottom: 5vh; */
    white-space: nowrap;
  }

  .marquee:before,
  .marquee:after {
    position: absolute;
    top: 0;
    width: 10rem;
    height: 100%;
    content: "";
    z-index: 1;
  }

  .marquee:before {
    left: 0;
    background: linear-gradient(to right, var(--main-bg) 0%, transparent 100%);
  }

  .marquee:after {
    right: 0;
    background: linear-gradient(to left, var(--main-bg) 0%, transparent 100%);
  }

  .marquee-content {
    list-style: none;
    height: 100%;
    display: inline-block;
    animation: scrolling var(--marquee-animation-duration) linear infinite;
    padding-left: 0px;
  }


  .marquee:hover .marquee-content {
    animation-play-state: paused;
  }

  @keyframes scrolling {
    0% {
      transform: translateX(0%);
    }

    100% {
      transform: translateX(-100%);
    }
  }

  .marquee-content li {
    display: inline-block;
    width: var(--marquee-element-width);
    max-height: 100%;
    font-size: calc(var(--marquee-height)*3/4);
    /* 5rem; */
    color: var(--marquee-element-color);
  }

  .marquee-content li img {
    width: 100%;
    /* height: 100%; */
    border: 2px solid #eee;
  }

  .cpp {
    fill: var(--marquee-element-color);
  }

  .cpp-inner {
    fill: var(--main-bg);
  }

  .vite{
    fill: var(--marquee-element-color);
  }
  .vite-inner{
    fill: var(--marquee-element-color);
    stroke: var(--main-bg);
  }

  @media (max-width: 600px) {
    html {
      font-size: 12px;
    }

    :root {
      --marquee-width: 100vw;
      --marquee-height: 16vh;
      --marquee-elements-displayed: 3;

    }

    marquee-content li{
      margin-right: 50px;
    }

    .marquee:before,
    .marquee:after {
      width: 5rem;
    }
  }
</style>
